<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainBuddy - Mathematics Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght Peak@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: rgba(17, 24, 39, 0.6);
            --accent-primary: #4f46e5;
            --accent-secondary: #06b6d4;
            --accent-danger: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 80%, #11102e, #090d16);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- SURVEY SCREEN OVERLAY --- */
        #surveyOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 15, 0.95);
            backdrop-filter: blur(25px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 2rem;
        }

        .survey-card {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .survey-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-secondary);
        }

        input, select {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent-primary);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--accent-primary), #3b82f6);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }

        .start-btn:hover { opacity: 0.9; }

        /* --- MAIN WORKSPACE GRID --- */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            height: 100vh;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .panel-header {
            background: rgba(3, 7, 18, 0.4);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- TUTOR INTERFACE --- */
        .tutor-stream {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .chat-block {
            padding: 1rem 1.25rem;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .chat-block.system { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); align-self: flex-start; }
        .chat-block.user { background: linear-gradient(135deg, var(--accent-primary), #3b82f6); align-self: flex-end; max-width: 80%; }

        .workspace-input-bar {
            border-top: 1px solid var(--border-color);
            padding: 1.25rem;
            display: flex;
            gap: 0.75rem;
        }
        .workspace-input-bar.hidden { display: none; }

        .workspace-input-bar input { flex-grow: 1; }

        .action-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0 1.25rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- WHITEBOARD CANVAS --- */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            background: #0d111a;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            cursor: crosshair;
        }

        .canvas-controls {
            display: flex;
            gap: 0.5rem;
        }

        .canvas-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .canvas-btn:hover { background: rgba(255,255,255,0.1); }

        .loading-view {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem;
            color: var(--text-muted);
        }
        .loading-view i { animation: spin 1s linear infinite; color: var(--accent-secondary); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="surveyOverlay">
        <div class="survey-card">
            <h2 style="margin-bottom: 0.5rem; font-weight:700;"><i class="fa-solid fa-calculator" style="color:var(--accent-secondary);"></i> Math Deck Calibration</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Configure your academic parameters to allow the AI to scale equations to your exact track.</p>
            
            <div class="survey-group">
                <label>Target Objective</label>
                <select id="goalInput">
                    <option value="Study comprehensive concept modules step-by-step">Comprehensive Study & Concept Walkthrough</option>
                    <option value="Strictly practice intensive calculations and drills">Targeted Problem Practice & Drills</option>
                </select>
            </div>

            <div class="survey-group">
                <label>Target Target Exam Date</label>
                <input type="date" id="examDateInput">
            </div>

            <div class="survey-group">
                <label>Current Comprehension Level</label>
                <select id="understandingInput">
                    <option value="Complete Beginner (Need visual foundations)">Complete Beginner (1-20%)</option>
                    <option value="Vaguely Familiar (Understand core terms, stuck on proofs)">Intermediate / Shaky Foundations (21-60%)</option>
                    <option value="Advanced Practitioner (Need specialized complexity testing)">Advanced (61-100%)</option>
                </select>
            </div>

            <div class="survey-group">
                <label>Core Topic Scope</label>
                <input type="text" id="topicInput" placeholder="e.g., Quadratic Equations, Derivatives, Geometry proofs...">
            </div>

            <div class="survey-group">
                <label>Student Profile Age</label>
                <input type="number" id="ageInput" value="16" min="8" max="25">
            </div>

            <button class="start-btn" onclick="initializeCalibratedMathEngine()">Synthesize Workspace</button>
        </div>
    </div>

    <div class="workspace">
        
        <div class="panel">
            <div class="panel-header">
                <h3><i class="fa-solid fa-brain" style="color:var(--accent-primary);"></i> Calibrated AI Instructor</h3>
                <span id="timeTracker" style="font-size:0.85rem; color:var(--text-muted);"></span>
            </div>
            
            <div class="tutor-stream" id="tutorStream">
                </div>

            <div class="loading-view" id="tutorLoader">
                <i class="fa-solid fa-circle-notch"></i> <span>Processing matrix equations...</span>
            </div>

            <div class="workspace-input-bar" id="inputWrapper">
                <input type="text" id="workspaceQuery" placeholder="Type your answer, formula calculation or question...">
                <button class="action-btn" onclick="submitTutorResponse()">Submit</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3><i class="fa-solid fa-chalkboard" style="color:var(--accent-secondary);"></i> Scratchpad Whiteboard</h3>
                <div class="canvas-controls">
                    <button class="canvas-btn" onclick="clearScratchpad()"><i class="fa-solid fa-trash-can"></i> Clear</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="scratchpad"></canvas>
            </div>
        </div>

    </div>

    <script>
        let mathSessionHistory = [];
        let canvas, ctx, drawing = false;

        window.addEventListener('DOMContentLoaded', () => {
            initCanvasEngine();
            // Default exam date picker to 2 weeks out
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + 14);
            document.getElementById('examDateInput').value = targetDate.toISOString().split('T')[0];
        });

        // HTML5 Whiteboard Drawing Logic
        function initCanvasEngine() {
            canvas = document.getElementById('scratchpad');
            ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.strokeStyle = '#06b6d4';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
            }
            
            window.addEventListener('resize', resizeCanvas);
            setTimeout(resizeCanvas, 100);

            canvas.addEventListener('mousedown', (e) => { drawing = true; draw(e); });
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            
            // Touch support for tablets/stylus
            canvas.addEventListener('touchstart', (e) => { drawing = true; draw(e.touches[0]); });
            canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
            canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
        }

        function draw(e) {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;
            
            ctx.lineTo(clientX, clientY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX, clientY);
        }

        function clearScratchpad() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Calibrated AI Orchestration
        async function initializeCalibratedMathEngine() {
            const goal = document.getElementById('goalInput').value;
            const examDate = document.getElementById('examDateInput').value;
            const contextLevel = document.getElementById('understandingInput').value;
            const topic = document.getElementById('topicInput').value.trim() || "General Mathematics";
            const age = document.getElementById('ageInput').value;

            if (!localStorage.getItem('bb_api_key')) {
                alert("Please initialize your Gemini API key in the AI Tutor Chat panel first.");
                return;
            }

            // Calculate countdown timeline metrics cleanly
            const daysLeft = Math.ceil((new Date(examDate) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('timeTracker').innerText = `${daysLeft > 0 ? daysLeft : 0} Days until target exam date`;
            document.getElementById('surveyOverlay').style.display = 'none';

            // Establish the structural tailored baseline directive
            const initialDirective = `You are a calibrated structural math tutor configured for an age ${age} student. 
            Objective parameter: ${goal}. Time constraints: ${daysLeft} days until exam evaluation. 
            Student context rating: ${contextLevel}. Target topic scope: ${topic}.

            CRITICAL STRUCTURAL PROTOCOLS:
            1. Formulate a tailored explanation suited perfectly for a student who is ${age} years old.
            2. Never generate character tags or asterisk tags (like ** or *). Keep equations cleanly formatted without tags. Use plain text layout breaks.
            3. Present information step-by-step. Provide one explanation block and follow it with exactly one interactive practice multiple choice or structured mathematical problem for the user to solve.
            4. Wait for the user's response before moving to the next topic module or diagnostic level.`;

            mathSessionHistory.push({
                role: 'user',
                parts: [{ text: `${initialDirective}\n\nSystem Command: Initiate the course plan now by explaining the first core mathematical sub-concept and providing our first problem.` }]
            });

            await queryMathCoreRelay();
        }

        async function submitTutorResponse() {
            const inputField = document.getElementById('workspaceQuery');
            const userText = inputField.value.trim();
            if (userText === "") return;

            // Append local UI element node
            appendMessageBubble(userText, 'user');
            inputField.value = "";

            mathSessionHistory.push({
                role: 'user',
                parts: [{ text: userText }]
            });

            await queryMathCoreRelay();
        }

        async function queryMathCoreRelay() {
            const loader = document.getElementById('tutorLoader');
            const inputWrapper = document.getElementById('inputWrapper');
            const apiKey = localStorage.getItem('bb_api_key');

            inputWrapper.classList.add('hidden');
            loader.style.display = 'flex';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: mathSessionHistory })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    
                    appendMessageBubble(aiText, 'system');
                    mathSessionHistory.push({
                        role: 'model',
                        parts: [{ text: aiText }]
                    });
                } else {
                    appendMessageBubble("System verification failure. Re-verify the active state of your key connection.", 'system');
                }
            } catch (err) {
                console.error(err);
                appendMessageBubble("Network handshake trace broken. Re-verify connectivity paths.", 'system');
            }

            loader.style.display = 'none';
            inputWrapper.classList.remove('hidden');
            const stream = document.getElementById('tutorStream');
            stream.scrollTop = stream.scrollHeight;
        }

        function appendMessageBubble(text, role) {
            const stream = document.getElementById('tutorStream');
            const div = document.createElement('div');
            div.className = `chat-block ${role}`;
            div.innerText = text;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }
    </script>
</body>
</html>
